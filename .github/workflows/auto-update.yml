name: Bing Daily Wallpaper Gallery

on:
  schedule:
    # 每天北京时间 8:30 (UTC 0:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .nojekyll for GitHub Pages
        run: touch .nojekyll

      - name: Run Python script
        run: python bing_gallery_v5.3.py

      - name: Validate Output
        id: validate
        run: |
          python -c "
          import json, re, os, sys
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          match = re.search(r'var ALL_IMAGES\s*=\s*(\[[\s\S]*?\]);', html)
          if not match:
              print('ERROR: ALL_IMAGES not found')
              sys.exit(1)
          imgs = json.loads(match.group(1), strict=False)
          total = len(imgs)
          empty_desc = sum(1 for i in imgs if not i.get('desc',''))
          short_desc = sum(1 for i in imgs if 0 < len(i.get('desc','')) < 200)
          file_size = os.path.getsize('index.html')
          max_empty = max(2, int(total * 0.1))
          max_trunc = max(3, int(total * 0.1))
          print(f'壁纸总数: {total}')
          print(f'空描述: {empty_desc} (<= {max_empty})')
          print(f'截断描述: {short_desc} (<= {max_trunc})')
          print(f'文件大小: {file_size/1024:.1f} KB')
          if total < 28 or empty_desc > max_empty or short_desc > max_trunc or file_size < 50000:
              print('校对失败！')
              sys.exit(1)
          print('校对通过！')
          "

      - name: Generate Supplement (if validation passed)
        if: success()
        run: python bing_gallery_github.py --supplement || true

      - name: Commit and Push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .bing_cache.json .nojekyll
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: $(date -u '+%Y-%m-%d') Bing Wallpaper Gallery"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
